name: Playwright E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual trigger'
      update_snapshots:
        description: 'Update visual regression baselines (commits new snapshots to repo)'
        type: boolean
        required: false
        default: false

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      RECAPTCHA_BYPASS_HEADER_NAME: ${{ secrets.RECAPTCHA_BYPASS_HEADER_NAME }}
      RECAPTCHA_BYPASS_HEADER_VALUE: ${{ secrets.RECAPTCHA_BYPASS_HEADER_VALUE }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: playwright
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" == "true" ]; then
            npx playwright test --project=chromium --update-snapshots
          else
            npx playwright test --project=chromium
          fi

      - name: Commit updated visual snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update visual regression baselines [skip ci]"
            git push
          fi

      - name: Parse test results
        id: results
        if: always()
        run: |
          if [ -f test-results.json ]; then
            PASSED=$(jq '.stats.expected // 0' test-results.json)
            FAILED=$(jq '.stats.unexpected // 0' test-results.json)
            TOTAL=$(( PASSED + FAILED ))
            FAILED_NAMES=$(jq -r '
              [.suites[].specs[]
                | select(.tests[].results[].status == "unexpected")
                | .title
              ] | unique | map("• " + .) | join("\n")
            ' test-results.json 2>/dev/null || echo "")
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            # Store multi-line value safely
            {
              echo "failed_names<<EOF"
              echo "$FAILED_NAMES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "failed_names=" >> $GITHUB_OUTPUT
          fi

      - name: Upload screenshots, videos and report
        id: upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Send Slack notification
        if: always()
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not set — skipping Slack notification."
            exit 0
          fi

          OUTCOME="${{ steps.playwright.outcome }}"
          PASSED="${{ steps.results.outputs.passed }}"
          FAILED="${{ steps.results.outputs.failed }}"
          TOTAL="${{ steps.results.outputs.total }}"
          FAILED_NAMES="${{ steps.results.outputs.failed_names }}"
          ARTIFACT_URL="${{ steps.upload.outputs.artifact-url }}"

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REASON=" — ${{ github.event.inputs.reason }}"
          else
            REASON=""
          fi

          # Build context section:
          #   pull_request → PR title + link
          #   push         → commit message + link
          #   otherwise    → nothing extra
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_URL="https://github.com/$REPO/commit/$COMMIT_SHA"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          if [ -n "$PR_NUMBER" ]; then
            PR_SECTION=",{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*PR:* <$PR_URL|#$PR_NUMBER $PR_TITLE>\"}}"
          elif [ "$EVENT" == "push" ]; then
            PR_SECTION=",{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Commit:* <$COMMIT_URL|\`$SHORT_SHA\`> $COMMIT_MSG\"}}"
          else
            PR_SECTION=""
          fi

          if [ "$OUTCOME" == "success" ]; then
            STATUS_HEADER="✅  All tests passed"
            COLOR="good"
            STATS_TEXT="*$PASSED / $TOTAL tests passed*"
          else
            STATUS_HEADER="❌  Some tests failed"
            COLOR="danger"
            STATS_TEXT="*$PASSED passed, $FAILED failed* (out of $TOTAL)"
          fi

          # Build failed tests section if there are failures
          if [ -n "$FAILED_NAMES" ] && [ "$FAILED" -gt "0" ]; then
            FAILED_SECTION=",{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Failed tests:*\n$FAILED_NAMES\"}}"
          else
            FAILED_SECTION=""
          fi

          # Build artifact link section if upload succeeded
          if [ -n "$ARTIFACT_URL" ]; then
            ARTIFACT_SECTION=",{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"📎 *Screenshots + videos:* <$ARTIFACT_URL|Download artifact>\"}}"
          else
            ARTIFACT_SECTION=""
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [
                {
                  \"color\": \"$COLOR\",
                  \"blocks\": [
                    {
                      \"type\": \"header\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"$STATUS_HEADER\"
                      }
                    },
                    {
                      \"type\": \"section\",
                      \"fields\": [
                        {\"type\": \"mrkdwn\", \"text\": \"$STATS_TEXT\"},
                        {\"type\": \"mrkdwn\", \"text\": \"*Branch:* \`$BRANCH\`$REASON\"}
                      ]
                    },
                    {
                      \"type\": \"section\",
                      \"fields\": [
                        {\"type\": \"mrkdwn\", \"text\": \"*Triggered by:* $ACTOR ($EVENT)\"},
                        {\"type\": \"mrkdwn\", \"text\": \"*Report:* <$RUN_URL|View on GitHub>\"}
                      ]
                    }
                    $PR_SECTION
                    $FAILED_SECTION
                    $ARTIFACT_SECTION
                  ]
                }
              ]
            }"
